<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Bambu Status Checker</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Bambu Status Checker</h1>
    <button id="enable-notif-btn" hidden>Enable Notifications</button>
  </header>

  <main>
    <section id="printer-table-wrap">
      <table id="printer-table">
        <thead>
          <tr>
            <th>Device</th>
            <th>State</th>
            <th>Detail</th>
            <th>Progress</th>
            <th>Remaining</th>
            <th>Metrics</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="printer-tbody"></tbody>
      </table>
      <p id="empty-state" class="empty-state" hidden>No devices added yet. Add one below.</p>
    </section>

    <section id="add-printer">
      <h2 id="form-title">Add Device</h2>
      <form id="printer-form">
        <input type="hidden" name="id" value="" />
        <label>
          Name
          <input type="text" name="name" placeholder="X1C - Garage" required />
        </label>
        <label>
          Device Type
          <select name="type" id="type-select"></select>
        </label>
        <div id="dynamic-fields"></div>
        <div class="form-actions">
          <button type="submit" id="submit-btn">Add Device</button>
          <button type="button" id="cancel-edit-btn" hidden>Cancel</button>
        </div>
      </form>
      <p id="form-error" class="error" role="alert"></p>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
