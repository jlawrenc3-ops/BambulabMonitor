<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Bambu Status Checker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Bambu Status Checker</h1>
  </header>

  <main>
    <section id="printer-table-wrap">
      <table id="printer-table">
        <thead>
          <tr>
            <th>Printer</th>
            <th>State</th>
            <th>Job</th>
            <th>Progress</th>
            <th>Remaining</th>
            <th>Layer</th>
            <th>Nozzle</th>
            <th>Bed</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="printer-tbody"></tbody>
      </table>
      <p id="empty-state" class="empty-state" hidden>No printers added yet. Add one below.</p>
    </section>

    <section id="add-printer">
      <h2 id="form-title">Add Printer</h2>
      <form id="printer-form">
        <input type="hidden" name="id" value="" />
        <label>
          Name
          <input type="text" name="name" placeholder="X1C - Garage" required />
        </label>
        <label>
          IP Address
          <input type="text" name="ip" placeholder="192.168.1.50" required />
        </label>
        <label>
          Access Code
          <input type="text" name="accessCode" placeholder="LAN access code (printer settings)" required />
        </label>
        <label>
          Serial Number
          <input type="text" name="serial" placeholder="Printer serial number" required />
        </label>
        <div class="form-actions">
          <button type="submit" id="submit-btn">Add Printer</button>
          <button type="button" id="cancel-edit-btn" hidden>Cancel</button>
        </div>
      </form>
      <p id="form-error" class="error" role="alert"></p>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
